/var/ossec/etc/ossec.conf
<ossec_config>

  <!-- Critère 1 : Auth AD -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/usr/local/pf/logs/radius/radius.log</location>
  </localfile>

  <!-- Critère 2 : Machine non enregistrée -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/usr/local/pf/logs/packetfence.log</location>
  </localfile>

  <!-- Critères 3 à 7 : Conformité -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/usr/local/pf/logs/compliance/*.log</location>
  </localfile>

</ossec_config>
